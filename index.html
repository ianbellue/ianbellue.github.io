<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Videos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: black;
      color: #c67b6b; /* pastel brick red */
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
      margin: 0;
      padding: 0 20px;
    }

    h1 {
      margin-top: 40px;
      font-size: 3em;
    }

    h2 {
      margin: 30px 0 10px 0;
      font-size: 2em;
    }

    p {
      font-size: 1.1em;
      margin-bottom: 30px;
    }

    iframe {
      margin: 20px 0;
      max-width: 100%;
    }

    .video-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h1>My Videos</h1>

  <div class="video-container">
    <h2>Video 1</h2>
    <iframe width="560" height="315"
      src="https://www.youtube.com/embed/?v=9s9MsqV0ooU"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
    <p>butt munch</p>
  </div>

  <div class="video-container">
    <h2>Video 2</h2>
    <iframe width="560" height="315"
      src="https://www.youtube.com/embed/VIDEO_ID_2"
      frameborder="0"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
    <p>Description or context for Video 2.</p>
  </div>

  <!-- Add more videos by copying one of the video-container divs and changing the VIDEO_ID -->
</body>
</html>
